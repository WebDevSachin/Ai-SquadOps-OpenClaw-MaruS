# SquadOps Production Deployment - Local Laptop
# Docker Compose with Swarm Mode, SSL, and Multi-Agent Support
#
# Usage:
#   docker swarm init
#   docker stack deploy -c docker-compose.prod.yml squadops
#   
# Or with docker-compose:
#   docker-compose -f docker-compose.prod.yml up -d

version: "3.8"

services:
  # ============================================
  # Nginx Reverse Proxy with SSL
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: squadops-nginx
    ports:
      - "80:80"
      - "443:443"
      - "18789:18789"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
      - dashboard
      - openclaw-gateway
    networks:
      - squadops-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: squadops-postgres
    environment:
      POSTGRES_DB: squadops
      POSTGRES_USER: squadops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-squadops_prod_secure}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./api/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./api/db/init-swarm.sql:/docker-entrypoint-initdb.d/02-init-swarm.sql:ro
    networks:
      - squadops-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squadops -d squadops"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: squadops-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    volumes:
      - redis-data:/data
    networks:
      - squadops-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # SquadOps API (Multi-instance)
  # ============================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    image: squadops/api:latest
    environment:
      # Database
      - DATABASE_URL=postgresql://squadops:${POSTGRES_PASSWORD:-squadops_prod_secure}@postgres:5432/squadops
      # Cache
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis:6379
      # Node
      - NODE_ENV=production
      - PORT=4000
      # Security
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production_jwt}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET:-change_this_encryption_secret}
      # URLs
      - CORS_ORIGIN=https://localhost,https://squadops.local
      - FRONTEND_URL=https://localhost
      # OpenClaw
      - OPENCLAW_GATEWAY_URL=http://openclaw-gateway:18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-squadops_gateway_token}
      # API Keys
      - SYSTEM_OPENROUTER_KEY=${SYSTEM_OPENROUTER_KEY}
      - SYSTEM_ANTHROPIC_KEY=${SYSTEM_ANTHROPIC_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - squadops-network
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # SquadOps Dashboard (Multi-instance)
  # ============================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.prod
    image: squadops/dashboard:latest
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - API_URL=http://api:4000
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api
    networks:
      - squadops-network
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # OpenClaw Gateway (Swarm Mode)
  # ============================================
  openclaw-gateway:
    image: fourplayers/openclaw:latest
    container_name: squadops-openclaw-gateway
    hostname: openclaw-gateway
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_TLS_ENABLED=false
      - OPENCLAW_SKIP_ONBOARD=true
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-squadops_gateway_token}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./openclaw-config:/home/node/.openclaw:ro
      - openclaw-data:/home/node/data
    networks:
      - squadops-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:18789/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================
  # Swarm Agent Workers (Multi-instance)
  # ============================================
  swarm-worker:
    build:
      context: ./api
      dockerfile: Dockerfile.worker
    image: squadops/swarm-worker:latest
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://squadops:${POSTGRES_PASSWORD:-squadops_prod_secure}@postgres:5432/squadops
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis:6379
      - OPENCLAW_GATEWAY_URL=http://openclaw-gateway:18789
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - postgres
      - redis
      - openclaw-gateway
    networks:
      - squadops-network
    deploy:
      replicas: 5
      restart_policy:
        condition: any
    command: ["node", "dist/workers/swarm-worker.js"]

  # ============================================
  # Background Job Processor
  # ============================================
  job-processor:
    build:
      context: ./api
      dockerfile: Dockerfile.worker
    image: squadops/job-processor:latest
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://squadops:${POSTGRES_PASSWORD:-squadops_prod_secure}@postgres:5432/squadops
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - squadops-network
    deploy:
      replicas: 2
      restart_policy:
        condition: any
    command: ["node", "dist/workers/job-processor.js"]

  # ============================================
  # Prometheus Monitoring
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: squadops-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - squadops-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # ============================================
  # Grafana Dashboards
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: squadops-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    networks:
      - squadops-network
    depends_on:
      - prometheus
    deploy:
      replicas: 1

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  openclaw-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  squadops-network:
    driver: overlay
    attachable: true
    name: squadops-network
